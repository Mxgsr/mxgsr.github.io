<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITULO}} - Maximiliano Soto</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡️</text></svg>">

    <!-- SEO -->
    <meta name="description" content="{{DESCRIPCION}}">
    <meta name="author" content="Maximiliano Soto">

    <!-- Open Graph -->
    <meta property="og:title" content="{{TITULO}} - Maximiliano Soto">
    <meta property="og:description" content="{{DESCRIPCION}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://maxsoto.cl/blog/posts/{{SLUG}}.html">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{TITULO}} - Maximiliano Soto">
    <meta name="twitter:description" content="{{DESCRIPCION}}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles.css">
    <script>if(localStorage.getItem("tema")==="dark")document.documentElement.classList.add("dark");</script>
</head>
<body>
    <div class="scanlines"></div>
    <div class="container">

        <div id="site-header"></div>
        <div id="site-nav"></div>

        <article class="post-content fade-in">
            <h1>{{TITULO}}</h1>
            <p class="post-meta">{{FECHA_LEGIBLE}}</p>
            {{CONTENIDO}}
        </article>

        <div id="site-footer"></div>

    </div>

    <button id="theme-toggle" class="theme-toggle"></button>
    <script src="../assets/components.js"></script>
    <script src="../assets/script.js"></script>
</body>
</html>
